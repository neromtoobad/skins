name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install
        run: npm ci
      - name: Type-check (strict)
        run: npx tsc --noEmit
      - name: Test
        run: npm test
      - name: Build
        run: npm run build
      - name: Validate reference library
        run: npx ts-node -e "import('./src/references/deep-references').then(m=>{if(m.DEEP_REFERENCES.length<13)process.exit(1);console.log(m.DEEP_REFERENCES.length+' blueprints OK')})"
